<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>Display Ruang Meeting</title>
  <style>
    :root {
      --paper: #F3F1EA;
      --ink: #14110E;
      --line: rgba(20, 17, 14, .14);
      --muted: #6B655C;
      --free: #15824B;
      --busy: #2563EB;
      --ending: #C5362F;
      --on: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      touch-action: manipulation
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'Segoe UI', system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased
    }

    .screen {
      height: 100vh;
      display: grid;
      grid-template-columns: 1.35fr 1fr
    }

    .stage {
      position: relative;
      padding: 5.5vh 4vw;
      display: flex;
      flex-direction: column;
      color: var(--on);
      background: #222;
      transition: background .6s ease;
      min-width: 0;
      overflow: hidden
    }

    .screen.free .stage {
      background: var(--free)
    }

    .screen.busy .stage {
      background: var(--busy)
    }

    .screen.ending .stage {
      background: var(--ending)
    }

    .eyebrow {
      font-size: clamp(11px, 1.25vw, 18px);
      letter-spacing: .32em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: .72
    }

    .room-name {
      font-size: clamp(40px, 6.2vw, 120px);
      font-weight: 800;
      line-height: .95;
      letter-spacing: -.02em;
      margin-top: 1.4vh
    }

    .room-meta {
      font-size: clamp(13px, 1.5vw, 22px);
      font-weight: 500;
      opacity: .78;
      margin-top: 1.4vh;
      display: flex;
      gap: 1.4vw;
      flex-wrap: wrap
    }

    .room-meta span {
      position: relative
    }

    .room-meta span+span::before {
      content: "";
      position: absolute;
      left: -.7vw;
      top: .15em;
      bottom: .15em;
      width: 1px;
      background: currentColor;
      opacity: .4
    }

    /* baris bawah: status (kiri) + countdown/jam (kanan) — tidak bertumpuk */
    .bottom {
      margin-top: auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 3vw
    }

    .status-wrap {
      min-width: 0;
      flex: 1
    }

    .status {
      display: flex;
      align-items: center;
      gap: 1.4vw;
      font-size: clamp(44px, 7.6vw, 140px);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: .92
    }

    .status .mk {
      width: clamp(15px, 1.6vw, 28px);
      height: clamp(15px, 1.6vw, 28px);
      border-radius: 50%;
      background: var(--on);
      flex: none
    }

    .current {
      margin-top: 2vh;
      border-top: 2px solid rgba(255, 255, 255, .35);
      padding-top: 2vh
    }

    .current .label {
      font-size: clamp(11px, 1.15vw, 16px);
      letter-spacing: .28em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: .72
    }

    .current .title {
      font-size: clamp(20px, 2.7vw, 42px);
      font-weight: 700;
      margin-top: .6vh;
      line-height: 1.05
    }

    .current .sub {
      font-size: clamp(14px, 1.6vw, 24px);
      font-weight: 500;
      opacity: .85;
      margin-top: .7vh;
      font-variant-numeric: tabular-nums
    }

    .clock {
      text-align: right;
      flex: none;
      padding-bottom: .4vh
    }

    .clock .cdlabel {
      font-size: clamp(10px, 1vw, 14px);
      letter-spacing: .24em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: .72;
      display: none
    }

    .clock .cd {
      font-size: clamp(30px, 4.6vw, 74px);
      font-weight: 800;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.02em;
      display: none;
      white-space: nowrap
    }

    .clock .time {
      font-size: clamp(15px, 1.6vw, 24px);
      font-weight: 600;
      opacity: .82;
      margin-top: .6vh;
      font-variant-numeric: tabular-nums
    }

    .screen.busy .clock .cd,
    .screen.busy .clock .cdlabel,
    .screen.ending .clock .cd,
    .screen.ending .clock .cdlabel {
      display: block
    }

    .agenda {
      padding: 5.5vh 3vw;
      display: flex;
      flex-direction: column;
      min-width: 0
    }

    .agenda-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 3px solid var(--ink);
      padding-bottom: 1.4vh;
      gap: 1vw
    }

    .agenda-head h3 {
      font-size: clamp(13px, 1.4vw, 20px);
      letter-spacing: .26em;
      text-transform: uppercase;
      font-weight: 800
    }

    .agenda-head .date {
      font-size: clamp(11px, 1.1vw, 16px);
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      text-align: right
    }

    #slots {
      margin-top: 1vh;
      overflow: hidden;
      counter-reset: slot
    }

    .slot {
      counter-increment: slot;
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-items: baseline;
      gap: 1.2vw;
      padding: 1.8vh .6vw;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background .2s, opacity .2s
    }

    .slot::before {
      content: counter(slot, decimal-leading-zero);
      font-size: clamp(12px, 1.2vw, 18px);
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums
    }

    .slot .stime {
      font-size: clamp(16px, 1.9vw, 28px);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.01em;
      white-space: nowrap
    }

    .slot .col2 {
      min-width: 0;
      text-align: right
    }

    .slot .stitle {
      font-size: clamp(13px, 1.35vw, 20px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      line-height: 1.15
    }

    .slot .sname {
      display: none;
      font-size: clamp(12px, 1.2vw, 17px);
      color: var(--muted);
      font-weight: 500;
      margin-top: .4vh;
      line-height: 1.2
    }

    .slot.reveal .sname {
      display: block
    }

    .slot.passed {
      opacity: .4
    }

    .slot.live .stime,
    .slot.live .stitle {
      color: var(--busy)
    }

    .slot.live {
      background: rgba(37, 99, 235, .08);
      border-radius: 10px
    }

    .empty {
      padding: 2.4vh 0;
      color: var(--muted);
      font-size: clamp(15px, 1.6vw, 22px);
      font-weight: 600
    }

    .agenda-foot {
      margin-top: auto;
      padding-top: 1.6vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: clamp(10px, 1vw, 14px);
      color: var(--muted);
      letter-spacing: .04em
    }

    .conn-ok::before,
    .conn-demo::before,
    .conn-err::before {
      content: "";
      display: inline-block;
      width: .7em;
      height: .7em;
      border-radius: 50%;
      margin-right: .5em;
      vertical-align: .02em
    }

    .conn-ok::before {
      background: var(--free)
    }

    .conn-demo::before {
      background: var(--ending)
    }

    .conn-err::before {
      background: var(--ending)
    }

    @media (max-aspect-ratio:1/1) {
      .screen {
        grid-template-columns: 1fr;
        grid-template-rows: 1.1fr 1fr
      }

      .bottom {
        flex-wrap: wrap;
        gap: 1.5vh
      }

      .clock {
        text-align: left
      }
    }

    /* kontrol pojok */
    .corner-btn {
      position: fixed;
      border: none;
      cursor: pointer;
      z-index: 25;
      font-family: inherit;
      background: rgba(20, 17, 14, .08);
      color: rgba(20, 17, 14, .6);
      backdrop-filter: blur(4px);
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 5px 10px
    }

    .corner-btn:hover {
      background: rgba(20, 17, 14, .18)
    }

    #fsbtn {
      right: 12px;
      bottom: 12px
    }

    #gear {
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      padding: 0;
      font-size: 14px
    }

    #cfg {
      position: fixed;
      inset: 0;
      background: rgba(20, 17, 14, .6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30
    }

    #cfg.show {
      display: flex
    }

    .cfg-card {
      background: var(--paper);
      border-radius: 8px;
      padding: 30px;
      width: min(520px, 92vw);
      border: 2px solid var(--ink)
    }

    .cfg-card h2 {
      font-size: 20px;
      margin-bottom: 8px;
      letter-spacing: .04em;
      text-transform: uppercase
    }

    .cfg-card label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 14px 0 4px;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 700
    }

    .cfg-card input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 4px;
      border: 1px solid var(--ink);
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-family: inherit
    }

    .cfg-card .row {
      display: flex;
      gap: 14px;
      margin-top: 24px;
      justify-content: flex-end
    }

    .cfg-card button {
      padding: 11px 20px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-family: inherit
    }

    .btn-save {
      background: var(--ink);
      color: #fff
    }

    .btn-cancel {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line)
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
      line-height: 1.6
    }

    .hint code {
      background: rgba(20, 17, 14, .06);
      padding: 1px 5px;
      border-radius: 3px
    }
  </style>
</head>

<body>
  <div class="screen" id="screen">
    <section class="stage">
      <div class="eyebrow">Ruang Meeting</div>
      <div class="room-name" id="roomName">Ruang</div>
      <div class="room-meta" id="roomMeta"></div>

      <div class="bottom">
        <div class="status-wrap">
          <div class="status"><span class="mk"></span><span id="statusText">—</span></div>
          <div class="current">
            <div class="label" id="curLabel">Sekarang</div>
            <div class="title" id="curTitle">—</div>
            <div class="sub" id="curSub"></div>
          </div>
        </div>
        <div class="clock">
          <div class="cdlabel" id="cdLabel">Sisa waktu</div>
          <div class="cd" id="countdown">--:--</div>
          <div class="time" id="clockTime">--:--</div>
        </div>
      </div>
    </section>

    <aside class="agenda">
      <div class="agenda-head">
        <h3>Jadwal Hari Ini</h3>
        <div class="date" id="clockDate">—</div>
      </div>
      <div id="slots"></div>
      <div class="agenda-foot">
        <span id="conn" class="conn-demo">Mode demo</span>
        <span>Diperbarui <span id="updatedAt">—</span></span>
      </div>
    </aside>
  </div>

  <button id="gear" class="corner-btn" title="Pengaturan">&#9881;</button>
  <button id="fsbtn" class="corner-btn" title="Layar penuh">&#9974; Layar penuh</button>

  <div id="cfg">
    <div class="cfg-card">
      <h2>Pengaturan Display</h2>
      <label>Endpoint backend (kosongkan untuk mode demo)</label>
      <input id="inApi" placeholder="/api/room/{room}/today">
      <label>Room key (mis. excellent)</label>
      <input id="inRoom" placeholder="excellent">
      <label>Interval refresh (detik)</label>
      <input id="inInt" type="number" min="5" placeholder="20">
      <div class="row">
        <button class="btn-cancel" id="btnCancel">Batal</button>
        <button class="btn-save" id="btnSave">Simpan</button>
      </div>
      <div class="hint">Display memanggil backend: <code>{ room, now, events:[{title,organizer,start,end}] }</code>.
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const cfg = {
      api: params.get('api') || '/api/room/{room}/today',
      room: params.get('room') || 'excellent',
      interval: parseInt(params.get('refresh') || '20', 10)
    };
    const SOON_MS = 15 * 60 * 1000;

    function demoData() {
      const now = new Date();
      const at = (h, m) => { const d = new Date(now); d.setHours(h, m, 0, 0); return d.toISOString(); };
      return {
        room: { key: cfg.room, name: 'Excellent', capacity: 4, location: 'Lantai 1' }, now: now.toISOString(),
        events: [
          { title: 'Sprint Planning', organizer: 'Hansel', start: at(8, 30), end: at(11, 0) },
          { title: 'HR Interview', organizer: 'Jessica', start: at(13, 0), end: at(now.getHours(), now.getMinutes() + 10) },
          { title: 'Weekly Sync', organizer: 'Dewi', start: at(16, 0), end: at(17, 0) }
        ]
      };
    }

    let timer = null, lastData = null, lastSig = '';

    async function fetchData() {
      if (!cfg.api) { render(demoData(), 'demo'); return; }
      try {
        const url = cfg.api.replace('{room}', encodeURIComponent(cfg.room));
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        render(await res.json(), 'ok');
      } catch (e) { setConn('err', 'Gagal terhubung'); }
    }

    function fmt(d) { return new Date(d).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }); }
    function pad(n) { return String(n).padStart(2, '0'); }
    function fmtDur(ms) {
      let s = Math.max(0, Math.floor(ms / 1000)); const h = Math.floor(s / 3600); s %= 3600; const m = Math.floor(s / 60); s %= 60;
      return h > 0 ? h + ':' + pad(m) + ':' + pad(s) : pad(m) + ':' + pad(s);
    }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

    function render(data, mode) {
      lastData = data;
      document.getElementById('roomName').textContent = data.room?.name || cfg.room;
      const bits = [];
      if (data.room?.capacity) bits.push('Kapasitas ' + data.room.capacity);
      if (data.room?.location) bits.push(data.room.location);
      document.getElementById('roomMeta').innerHTML = bits.map(b => '<span>' + esc(b) + '</span>').join('');

      const events = (data.events || []).slice().sort((a, b) => new Date(a.start) - new Date(b.start));
      const sig = JSON.stringify(events.map(e => [e.start, e.end, e.title, e.organizer]));
      if (sig !== lastSig) { lastSig = sig; buildSlots(events); }

      setConn(mode === 'ok' ? 'ok' : 'demo', mode === 'ok' ? 'Terhubung' : 'Mode demo');
      document.getElementById('updatedAt').textContent = new Date().toLocaleTimeString('id-ID');
      paint();
    }

    function buildSlots(events) {
      const wrap = document.getElementById('slots'); wrap.innerHTML = '';
      if (!events.length) { wrap.innerHTML = '<div class="empty">Belum ada booking hari ini.</div>'; return; }
      events.forEach(ev => {
        const div = document.createElement('div');
        div.className = 'slot';
        div.dataset.start = new Date(ev.start).getTime();
        div.dataset.end = new Date(ev.end).getTime();
        div.innerHTML = '<div class="stime">' + fmt(ev.start) + ' – ' + fmt(ev.end) + '</div>'
          + '<div class="col2"><div class="stitle">' + esc(ev.title || ev.organizer || 'Terpakai') + '</div>'
          + '<div class="sname">' + esc(ev.organizer || '') + '</div></div>';
        div.onclick = () => div.classList.toggle('reveal');
        wrap.appendChild(div);
      });
    }

    function paint() {
      if (!lastData) return;
      const now = Date.now();
      const events = (lastData.events || []).map(e => ({ ...e, s: new Date(e.start).getTime(), e2: new Date(e.end).getTime() })).sort((a, b) => a.s - b.s);
      const current = events.find(ev => now >= ev.s && now < ev.e2);
      const upcoming = events.filter(ev => ev.s > now);

      const screen = document.getElementById('screen');
      screen.classList.remove('free', 'busy', 'ending');
      const stt = document.getElementById('statusText');
      const curLabel = document.getElementById('curLabel');
      const curTitle = document.getElementById('curTitle');
      const curSub = document.getElementById('curSub');
      const cd = document.getElementById('countdown');

      if (current) {
        const remain = current.e2 - now;
        screen.classList.add(remain <= SOON_MS ? 'ending' : 'busy');
        stt.textContent = 'DIPAKAI';
        curLabel.textContent = 'Sedang berlangsung';
        curTitle.textContent = current.title || 'Terpakai';
        curSub.textContent = fmt(current.s) + ' – ' + fmt(current.e2) + (current.organizer ? ' · ' + current.organizer : '');
        cd.textContent = fmtDur(remain);
      } else {
        screen.classList.add('free');
        stt.textContent = 'KOSONG';
        if (upcoming[0]) {
          curLabel.textContent = 'Booking berikutnya';
          curTitle.textContent = upcoming[0].title || 'Terpakai';
          curSub.textContent = fmt(upcoming[0].s) + ' – ' + fmt(upcoming[0].e2) + (upcoming[0].organizer ? ' · ' + upcoming[0].organizer : '');
        } else {
          curLabel.textContent = 'Sisa hari ini';
          curTitle.textContent = 'Tidak ada jadwal';
          curSub.textContent = 'Ruangan tersedia';
        }
      }

      document.querySelectorAll('#slots .slot').forEach(el => {
        const s = +el.dataset.start, e = +el.dataset.end;
        el.classList.toggle('live', now >= s && now < e);
        el.classList.toggle('passed', e <= now);
      });
    }

    function setConn(state, label) {
      const el = document.getElementById('conn');
      el.className = state === 'ok' ? 'conn-ok' : state === 'err' ? 'conn-err' : 'conn-demo';
      el.textContent = label;
    }

    function tick() {
      const n = new Date();
      document.getElementById('clockTime').textContent = n.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('clockDate').textContent = n.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      paint();
    }

    function startLoop() { if (timer) clearInterval(timer); fetchData(); timer = setInterval(fetchData, Math.max(5, cfg.interval) * 1000); }

    // ---------- Fullscreen + anti-zoom ----------
    const fsbtn = document.getElementById('fsbtn');
    function isFs() { return document.fullscreenElement || document.webkitFullscreenElement; }
    function toggleFs() {
      if (isFs()) { (document.exitFullscreen || document.webkitExitFullscreen).call(document); }
      else { const el = document.documentElement; (el.requestFullscreen || el.webkitRequestFullscreen).call(el).catch(() => { }); }
    }
    fsbtn.onclick = toggleFs;
    function syncFsBtn() { fsbtn.innerHTML = isFs() ? '&#10005; Keluar' : '&#9974; Layar penuh'; }
    document.addEventListener('fullscreenchange', syncFsBtn);
    document.addEventListener('webkitfullscreenchange', syncFsBtn);
    syncFsBtn();

    // cegah zoom: ctrl+scroll, ctrl/cmd +/-/0, pinch (Safari gesture), double-tap
    window.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
    window.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && ['+', '-', '=', '0'].includes(e.key)) e.preventDefault();
    }, { passive: false });
    ['gesturestart', 'gesturechange', 'gestureend'].forEach(ev => document.addEventListener(ev, e => e.preventDefault()));
    let lastTouch = 0;
    document.addEventListener('touchend', e => { const t = Date.now(); if (t - lastTouch <= 300) e.preventDefault(); lastTouch = t; }, { passive: false });

    // ---------- Pengaturan ----------
    const cfgEl = document.getElementById('cfg');
    document.getElementById('gear').onclick = () => {
      document.getElementById('inApi').value = cfg.api;
      document.getElementById('inRoom').value = cfg.room;
      document.getElementById('inInt').value = cfg.interval;
      cfgEl.classList.add('show');
    };
    document.getElementById('btnCancel').onclick = () => cfgEl.classList.remove('show');
    document.getElementById('btnSave').onclick = () => {
      cfg.api = document.getElementById('inApi').value.trim();
      cfg.room = document.getElementById('inRoom').value.trim() || 'excellent';
      cfg.interval = parseInt(document.getElementById('inInt').value, 10) || 20;
      cfgEl.classList.remove('show'); startLoop();
    };

    tick(); setInterval(tick, 1000);
    startLoop();
  </script>
</body>

</html>
